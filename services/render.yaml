services:
  # PostgreSQL Database
  - type: pserv
    name: fyp-postgres
    env: docker
    plan: free
    
  # Flask Backend
  - type: web
    name: fyp-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fyp-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.1